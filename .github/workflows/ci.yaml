name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install project
        run: pip install -e .

      - name: Lint
        run: ruff check .

      - name: Run tests
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
          TRANSFORMERS_NO_ADVISORY_WARNINGS: '1'
        run: pytest -q

      - name: Smoke check
        run: make smoke
